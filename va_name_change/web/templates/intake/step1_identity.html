{% extends "base.html" %}
{% block title %}Step 1 — Identity{% endblock %}
{% block content %}
<div class="steps">
  <div class="step active">1. Identity</div>
  <div class="step">2. Personal</div>
  <div class="step">3. Address</div>
  <div class="step">4. Confirm</div>
</div>

<div class="card">
  <h2>Step 1: Your Identity</h2>

  <form method="POST">
    <label for="current_name">Current Full Legal Name</label>
    <input type="text" id="current_name" name="current_name"
           value="{{ current_name }}" placeholder="As it appears on your government-issued ID" required>

    <label for="desired_name">Desired New Full Legal Name</label>
    <input type="text" id="desired_name" name="desired_name"
           value="{{ desired_name }}" placeholder="The name you want to change to" required>

    <label for="reason">Reason for Name Change</label>
    <select id="reason" name="reason" required>
      <option value="">— Select a reason —</option>
      {% for r in ["Marriage", "Divorce", "Personal preference", "Gender identity", "Other"] %}
        <option value="{{ r }}" {{ 'selected' if reason == r }}>{{ r }}</option>
      {% endfor %}
    </select>

    <button type="submit" class="btn">Continue to Step 2</button>
  </form>
</div>
{% endblock %}
