name: "CI-CD Pipeline"

permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY_DECLAN: ${{ secrets.OPENAI_API_KEY_DECLAN }}

    steps:
      - name: "Check out code"
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: "Set up Python"
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: "Install dependencies"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "openai==0.28.*"   # pinned for self-healing orchestrator

      - name: "Run tests & capture logs"
        run: |
          pytest tests/ --maxfail=3 --disable-warnings -v 2>&1 | tee test_output.log
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ]; then
            echo "[pytest logs]" > fail_logs.txt
            cat test_output.log >> fail_logs.txt
            exit $exit_code
          fi

      - name: "Self-Healing"
        if: failure()
        run: |
          echo "Self-Heal attempt: gather code + logs -> fail_logs.txt, run orchestrator."
          git config user.name "SelfHealBot"
          git config user.email "selfheal@bot.com"

          # Append source code and tests into fail_logs for context
          echo "" >> fail_logs.txt
          echo "[SOURCE FILES BELOW]:" >> fail_logs.txt
          for f in $(find va_name_change -name '*.py' -type f); do
            echo "" >> fail_logs.txt
            echo "=== $f ===" >> fail_logs.txt
            cat "$f" >> fail_logs.txt
          done
          echo "" >> fail_logs.txt
          echo "[TEST FILES BELOW]:" >> fail_logs.txt
          for f in tests/*.py; do
            echo "" >> fail_logs.txt
            echo "=== $f ===" >> fail_logs.txt
            cat "$f" >> fail_logs.txt
          done

          git add fail_logs.txt
          git commit -m "Add fail_logs with code & logs" || echo "No changes to commit"
          git push --force origin main

          echo "Running orchestrator..."
          python ./orchestrator.py

          echo "Committing orchestrator changes..."
          git add .
          git commit -m "Selfheal attempt" || echo "No changes to commit"
          git push --force origin main

          # re-run tests once
          pytest tests/ --maxfail=3 --disable-warnings -v || echo "Still failing..."
